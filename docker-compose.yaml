services:
  peerclaw:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - peerclaw-data:/data
    environment:
      - PEERCLAW_REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  peerclaw-data:
  redis-data:
