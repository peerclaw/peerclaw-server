version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - unused

  settings:
    errcheck:
      # Don't flag deferred Close / cleanup calls – the error is unactionable in
      # a defer and wrapping them hurts readability.
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
        - (*github.com/redis/go-redis/v9.PubSub).Close

  exclusions:
    rules:
      # Exclude errcheck in test files – test helpers rarely need error checking.
      - path: _test\.go
        linters:
          - errcheck

      # nhooyr.io/websocket is deprecated in favour of github.com/coder/websocket.
      # Migration is tracked separately; suppress SA1019 for the signaling package.
      - path: internal/signaling/
        linters:
          - staticcheck
        text: "SA1019"

      # QF1002 (convert if/else-if chain to tagged switch) is a style suggestion.
      - linters:
          - staticcheck
        text: "QF1002"
