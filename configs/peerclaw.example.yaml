server:
  http_addr: ":8080"
  cors_origins: []                   # e.g. ["https://dashboard.example.com"]

auth:
  required: false                    # Set true in production

database:
  driver: "sqlite"                   # "sqlite" or "postgres"
  dsn: "peerclaw.db"                 # SQLite file or PostgreSQL DSN

redis:
  addr: "localhost:6379"
  password: ""                       # Use "${REDIS_PASSWORD}" for env var substitution
  db: 0

logging:
  level: "info"                      # debug, info, warn, error
  format: "text"                     # text, json

bridge:
  a2a:
    enabled: true
  acp:
    enabled: true
  mcp:
    enabled: true

signaling:
  enabled: true
  turn:
    urls: []                         # e.g. ["turn:turn.example.com:3478"]
    username: ""
    credential: ""                   # Use "${TURN_CREDENTIAL}" for env var

rate_limit:
  enabled: true
  requests_per_sec: 100
  burst_size: 200
  max_connections: 1000

observability:
  enabled: false
  otlp_endpoint: "localhost:4317"
  service_name: "peerclaw-gateway"
  traces_sampling: 0.1               # Sample 10% of traces

audit_log:
  enabled: true
  output: "stdout"                   # or "file:/var/log/peerclaw-audit.log"

user_auth:
  enabled: false
  jwt_secret: "${JWT_SECRET}"    # Required when user_auth is enabled
  admin_emails: []               # Emails auto-promoted to admin on login/register

federation:
  enabled: false
  node_name: "node-1"
  auth_token: "${FEDERATION_TOKEN}"  # Required when federation is enabled
  peers: []
  # peers:
  #   - name: "node-2"
  #     address: "https://node2.example.com"
  #     token: "${FEDERATION_PEER_TOKEN}"
